<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subiteren op de Maan</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-border: #d7deeb;
      --accent: #4e7cf0;
      --success: #56b870;
      --text: #1f2d3d;
      --muted: #66758c;
      --shadow: 0 10px 30px rgba(29, 49, 84, 0.12);
      --menu-width: 320px;
      --card-size: min(50vh, 500px);
      --astronaut-size: 360px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #ffffff 0%, var(--bg) 55%, #e6edf9 100%);
      color: var(--text);
      overflow: hidden;
    }

    button, input, label {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: var(--menu-width) 1fr;
      height: 100vh;
      gap: 20px;
      padding: 16px;
    }

    .sidebar {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: auto;
      min-height: 0;
      touch-action: manipulation;
    }

    .sidebar h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .sidebar p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .section {
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 12px;
      background: #fbfcff;
    }

    .controls-section {
      position: sticky;
      bottom: 0;
      z-index: 20;
      margin-top: auto;
      background: rgba(251, 252, 255, 0.98);
      backdrop-filter: blur(6px);
      box-shadow: 0 -8px 18px rgba(29, 49, 84, 0.08);
    }

    .section-title {
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .choice-group {
      display: grid;
      gap: 8px;
    }

    .check-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: white;
      border: 1px solid var(--panel-border);
      cursor: pointer;
      user-select: none;
    }

    .check-option input {
      transform: scale(1.25);
      accent-color: var(--accent);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .option-emoji {
      width: 28px;
      text-align: center;
      font-size: 1.2rem;
    }

    .button-stack {
      display: grid;
      gap: 10px;
    }

    .control-btn {
      border: 0;
      border-radius: 18px;
      padding: 16px 14px;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      box-shadow: var(--shadow);
      cursor: pointer;
      min-height: 58px;
      transition: transform 140ms ease, filter 140ms ease, opacity 140ms ease;
    }

    .control-btn:hover {
      filter: brightness(1.03);
    }

    .control-btn:active {
      transform: translateY(2px) scale(0.99);
    }

    .control-btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-new { background: linear-gradient(180deg, #5f88ff, #4370ee); }
    .btn-show { background: linear-gradient(180deg, #ffcb72, #f1a62d); }
    .btn-answer { background: linear-gradient(180deg, #68c983, #4ca866); }
    .btn-next { background: linear-gradient(180deg, #9a80ff, #775ce2); }
    .btn-reset { background: linear-gradient(180deg, #8591a8, #657288); }
    .btn-manual { background: linear-gradient(180deg, #31b7b2, #1f918d); }

    .slider-row {
      display: grid;
      gap: 10px;
    }

    .slider-block {
      background: white;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 12px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .slider-value {
      min-width: 40px;
      text-align: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4ff;
      color: #3658b9;
      font-weight: 800;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .main {
      display: grid;
      grid-template-rows: 1fr 320px;
      gap: 18px;
      min-width: 0;
    }

    .board {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .board::before,
    .board::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(120, 142, 183, 0.08);
      pointer-events: none;
    }

    .board::before {
      width: 280px;
      height: 280px;
      top: -80px;
      right: -80px;
    }

    .board::after {
      width: 180px;
      height: 180px;
      bottom: -50px;
      left: -50px;
    }

    .center-stage {
      position: relative;
      z-index: 1;
      width: min(86%, 760px);
      height: min(86%, 760px);
      display: grid;
      place-items: center;
    }

    .prompt-icon {
      width: 160px;
      height: 160px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: white;
      border: 4px solid var(--panel-border);
      box-shadow: var(--shadow);
      font-size: 4.2rem;
    }

    .prompt-icon.hidden,
    .card-wrap.hidden,
    .answer-badge.hidden {
      display: none;
    }

    .card-wrap {
      width: var(--card-size);
      height: var(--card-size);
      max-width: 92%;
      max-height: 92%;
      border-radius: 34px;
      background: #fff;
      border: 6px solid #dde6f2;
      box-shadow: 0 20px 50px rgba(22, 41, 74, 0.14);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      padding: 18px;
    }

    .card-surface {
      width: 100%;
      height: 100%;
      position: relative;
      display: grid;
      place-items: center;
    }

    .card-surface img {
      width: 94%;
      height: 94%;
      object-fit: contain;
      display: block;
    }

    .answer-badge {
      position: absolute;
      right: 24px;
      top: 24px;
      z-index: 2;
      min-width: 92px;
      height: 92px;
      padding: 0 18px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #56c673, #47ab62);
      color: white;
      font-weight: 900;
      font-size: 3rem;
      box-shadow: var(--shadow);
      border: 4px solid rgba(255,255,255,0.55);
    }

    .mission {
      background: linear-gradient(180deg, #f6f9ff, #eef4fd);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      padding: 18px 26px;
    }

    .mission::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56%;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0) 0%,
        rgba(200,212,232,0.16) 30%,
        rgba(210,220,236,0.55) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    .planet {
      position: absolute;
      left: 24px;
      top: 18px;
      width: 62px;
      height: 62px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #f7f1cf 38%, #e3d28f 100%);
      box-shadow: inset -10px -10px 0 rgba(0,0,0,0.06), 0 8px 18px rgba(70,84,118,0.12);
      z-index: 1;
    }

    .mission-track {
      position: absolute;
      left: 80px;
      right: 120px;
      bottom: 42px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 2;
    }

    .track-line {
      position: absolute;
      left: 22px;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ced7e7, #d9e1ef);
      z-index: 1;
    }

    .track-node {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: white;
      border: 5px solid #c7d2e5;
      position: relative;
      z-index: 2;
      box-shadow: 0 6px 12px rgba(63, 81, 121, 0.12);
    }

    .track-node.done {
      background: #dff7e6;
      border-color: #7ac389;
    }

    .base {
      position: absolute;
      right: 26px;
      bottom: 16px;
      width: 110px;
      height: 110px;
      z-index: 3;
    }

    .rocket {
      position: absolute;
      right: 35px;
      bottom: -35px;
      width: 200px;
      height: 290px;
      z-index: 50;
      transform-origin: center bottom;
      opacity: 1;
      pointer-events: none;
    }

    .rocket img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .rocket-flame {
  position: absolute;
  left: 50%;
  bottom: -10px;
  width: 26px;
  height: 40px;
  border-radius: 50% 50% 70% 70%;
  background: linear-gradient(180deg, #ffe57c, #ff9b34 50%, #ff6534 100%);
  filter: blur(0.3px);
  opacity: 0;
  transform: translateX(-50%) scaleY(1);
  transform-origin: center top;
  animation: flame 240ms linear infinite alternate;
  will-change: transform, opacity;
}

    .rocket.launch-ready .rocket-flame,
    .rocket.launching .rocket-flame {
      opacity: 1;
    }

    .rocket.launching {
      animation: rocketLaunch 2000ms cubic-bezier(.22,.61,.18,1) forwards;
    }

    @keyframes rocketLaunch {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      15% {
        transform: translateY(-14px) scale(1.02);
        opacity: 1;
      }
      100% {
        transform: translateY(-520px) scale(1.08);
        opacity: 0;
      }
    }

    .astronaut {
  position: absolute;
  left: 80px;
  bottom: 6px;
  width: var(--astronaut-size);
  height: var(--astronaut-size);
  z-index: 30;
  transition: left 500ms linear;
}

    .astronaut.hidden-flight {
      opacity: 0;
    }

    .astronaut img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: auto;
    }

    .astronaut-inner {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      animation: floatIdle 2200ms ease-in-out infinite;
    }

    .status-row {
      position: absolute;
      left: 20px;
      top: 18px;
      z-index: 4;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .burst,
    .dust-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 40;
    }

    .spark {
      position: absolute;
      width: 18px;
      height: 18px;
      font-size: 18px;
      animation: sparkFly 900ms ease-out forwards;
      opacity: 0;
    }

    .dust {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), rgba(210,220,232,0.9) 45%, rgba(194,205,219,0.45) 72%, rgba(194,205,219,0) 100%);
      animation: dustPuff 700ms ease-out forwards;
      opacity: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes floatIdle {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes sparkFly {
      0% { opacity: 1; transform: translate(0, 0) scale(0.5); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.2); }
    }

    @keyframes dustPuff {
      0% { opacity: 0.85; transform: translate(0, 0) scale(0.35); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.65); }
    }

    @keyframes flame {
  0% { transform: translateX(-50%) scaleY(0.82); }
  100% { transform: translateX(-50%) scaleY(1.1); }
}

    @media (max-width: 1100px) {
      .app { grid-template-columns: 240px 1fr; }
      :root { --menu-width: 240px; }
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        overflow: auto;
        height: auto;
        min-height: 100vh;
      }

      .main { min-height: 900px; }
      .mission-track { left: 40px; right: 120px; }
      .astronaut { left: 40px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <h2>Subiteren op de Maan</h2>
        <p>Docentbediening links. Groot, rustig spelvlak voor de kring.</p>
      </div>

      <section class="section">
        <div class="section-title">🎚 Bereik</div>
        <div class="slider-row">
          <div class="slider-block">
            <div class="slider-label">
              <span>minimum</span>
              <span id="minValue" class="slider-value">1</span>
            </div>
            <input id="minSlider" type="range" min="1" max="10" value="1" />
          </div>

          <div class="slider-block">
            <div class="slider-label">
              <span>maximum</span>
              <span id="maxValue" class="slider-value">4</span>
            </div>
            <input id="maxSlider" type="range" min="1" max="10" value="4" />
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">🃏 Kaartsoorten</div>
        <div class="choice-group" id="typeGroup">
          <label class="check-option"><input type="checkbox" value="fingers" checked><span class="option-emoji">✋</span>vingers</label>
          <label class="check-option"><input type="checkbox" value="stars" checked><span class="option-emoji">⭐</span>sterren</label>
          <label class="check-option"><input type="checkbox" value="dice" checked><span class="option-emoji">🎲</span>dobbelstenen</label>
          <label class="check-option"><input type="checkbox" value="tally" checked><span class="option-emoji">////</span>turven</label>
          <label class="check-option"><input type="checkbox" value="tenframe" checked><span class="option-emoji">🔟</span>10-structuur</label>
        </div>
      </section>

      <section class="section">
        <div class="section-title">⏱ Kaarttijd</div>
        <div class="choice-group">
          <label class="check-option"><input type="radio" name="showTime" value="800"><span class="option-emoji">⏱</span>kort</label>
          <label class="check-option"><input type="radio" name="showTime" value="1200" checked><span class="option-emoji">⏱</span>normaal</label>
          <label class="check-option"><input type="radio" name="showTime" value="1800"><span class="option-emoji">⏱</span>lang</label>
        </div>
      </section>

      <section class="section controls-section">
        <div class="section-title">🕹 Besturing</div>
        <div class="button-stack">
          <button id="newCardBtn" class="control-btn btn-new">Nieuwe kaart</button>
          <button id="showAgainBtn" class="control-btn btn-show" disabled>Toon opnieuw</button>
          <button id="showAnswerBtn" class="control-btn btn-answer" disabled>Toon antwoord</button>
          <button id="nextStepBtn" class="control-btn btn-next" disabled>Volgende kaart</button>
          <button id="manualMoveBtn" class="control-btn btn-manual">Astronaut vooruit</button>
          <button id="resetBtn" class="control-btn btn-reset">Reset missie</button>
        </div>
      </section>
    </aside>

    <main class="main">
      <section class="board">
        <div class="status-row">
          <div class="badge"><span>🎚</span><span id="statusRange">1 t/m 4</span></div>
          <div class="badge"><span>🃏</span><span id="statusTypes">5 soorten</span></div>
        </div>

        <div class="center-stage">
          <div id="promptIcon" class="prompt-icon">👀</div>
          <div id="cardWrap" class="card-wrap hidden">
            <div id="answerBadge" class="answer-badge hidden">5</div>
            <div id="cardSurface" class="card-surface"></div>
          </div>
        </div>
      </section>

      <section class="mission">
        <div class="planet"></div>
        <div class="burst" id="burst"></div>
        <div class="dust-layer" id="dustLayer"></div>

        <div class="mission-track" id="track">
          <div class="track-line"></div>
        </div>

        <div class="astronaut" id="astronaut" aria-hidden="true">
          <img id="astronautImg" alt="astronaut" />
        </div>

        <div class="rocket" id="rocket" aria-hidden="true">
          <img id="rocketImg" src="rocket.png" alt="raket" />
          <div class="rocket-flame"></div>
        </div>

        <div class="base"></div>
      </section>
    </main>
  </div>

  <div class="sr-only" aria-live="polite" id="liveRegion"></div>

  <script>
    const state = {
      minValue: 1,
      maxValue: 4,
      types: new Set(["fingers", "stars", "dice", "tally", "tenframe"]),
      showTime: 1200,
      currentCard: null,
      previousAnswerValue: null,
      progress: 0,
      stepCount: 6,
      stage: "idle",
      lock: false,
      rocketReady: false,
      spriteTimer: null,
      idleFrames: ["sprites/astronaut/idle/frame_000001.png"],
      walkFrames: [],
      jumpFrames: [],
      cardManifest: {},
      assetsReady: true,
      astronautFallbackShown: false,
      cardVisible: false,
    };

    const els = {
      newCardBtn: document.getElementById("newCardBtn"),
      showAgainBtn: document.getElementById("showAgainBtn"),
      showAnswerBtn: document.getElementById("showAnswerBtn"),
      nextStepBtn: document.getElementById("nextStepBtn"),
      manualMoveBtn: document.getElementById("manualMoveBtn"),
      resetBtn: document.getElementById("resetBtn"),
      promptIcon: document.getElementById("promptIcon"),
      cardWrap: document.getElementById("cardWrap"),
      cardSurface: document.getElementById("cardSurface"),
      answerBadge: document.getElementById("answerBadge"),
      track: document.getElementById("track"),
      astronaut: document.getElementById("astronaut"),
      astronautImg: document.getElementById("astronautImg"),
      rocket: document.getElementById("rocket"),
      rocketImg: document.getElementById("rocketImg"),
      burst: document.getElementById("burst"),
      dustLayer: document.getElementById("dustLayer"),
      statusRange: document.getElementById("statusRange"),
      statusTypes: document.getElementById("statusTypes"),
      liveRegion: document.getElementById("liveRegion"),
      minSlider: document.getElementById("minSlider"),
      maxSlider: document.getElementById("maxSlider"),
      minValue: document.getElementById("minValue"),
      maxValue: document.getElementById("maxValue"),
    };

    const typeLabels = {
      fingers: "vingers",
      stars: "sterren",
      dice: "dobbelstenen",
      tally: "turven",
      tenframe: "10-structuur",
    };

    const DEFAULT_ASTRONAUT_TRANSITION = "left 800ms ease, bottom 700ms ease, transform 420ms ease, opacity 160ms ease";
    const JUMP_ASTRONAUT_TRANSITION = "left 480ms ease, bottom 300ms ease, transform 420ms ease, opacity 160ms ease";
const JUMP_MOVE_START_FRAME = 98;
const JUMP_LAND_FRAME = 117;
const JUMP_START_FRAME = 90;
const JUMP_FPS = 18;
    
    function buildWalkFrames() {
      const frames = [];
      for (let i = 48; i <= 69; i++) {
        frames.push(`sprites/astronaut/walk/frame_${String(i).padStart(6, "0")}.png`);
      }
      return frames;
    }

    function buildJumpFrames() {
      const frames = [];
      for (let i = 90; i <= 145; i++) {
        frames.push(`sprites/astronaut/jump-land/frame_${String(i).padStart(6, "0")}.png`);
      }
      return frames;
    }

    state.walkFrames = buildWalkFrames();
    state.jumpFrames = buildJumpFrames();

    state.cardManifest = {
      fingers: {
        1: ["cards/fingers/hand01.svg"],
        2: ["cards/fingers/hand02.svg"],
        3: ["cards/fingers/hand03.svg"],
        4: ["cards/fingers/hand04.svg"],
        5: ["cards/fingers/hand05.svg"],
        6: ["cards/fingers/hand06.svg"],
        7: ["cards/fingers/hand07.svg"],
        8: ["cards/fingers/hand08.svg"],
        9: ["cards/fingers/hand09.svg"],
        10: ["cards/fingers/hand10.svg"]
      },
      stars: {
        1: ["cards/stars/sterren01.svg"],
        2: ["cards/stars/sterren02.svg"],
        3: ["cards/stars/sterren03.svg"],
        4: ["cards/stars/sterren04.svg"],
        5: ["cards/stars/sterren05.svg"],
        6: ["cards/stars/sterren06.svg"],
        7: ["cards/stars/sterren07.svg"],
        8: ["cards/stars/sterren08.svg"],
        9: ["cards/stars/sterren09.svg"],
        10: ["cards/stars/sterren10.svg"]
      },
      tally: {
        1: ["cards/tally/turven01.svg"],
        2: ["cards/tally/turven02.svg"],
        3: ["cards/tally/turven03.svg"],
        4: ["cards/tally/turven04.svg"],
        5: ["cards/tally/turven05.svg"],
        6: ["cards/tally/turven06.svg"],
        7: ["cards/tally/turven07.svg"],
        8: ["cards/tally/turven08.svg"],
        9: ["cards/tally/turven09.svg"],
        10: ["cards/tally/turven10.svg"]
      },
      tenframe: {
        1: ["cards/tenframe/10-veld01.svg"],
        2: ["cards/tenframe/10-veld02.svg"],
        3: ["cards/tenframe/10-veld03.svg"],
        4: ["cards/tenframe/10-veld04.svg"],
        5: ["cards/tenframe/10-veld05.svg"],
        6: ["cards/tenframe/10-veld06.svg"],
        7: ["cards/tenframe/10-veld07.svg"],
        8: ["cards/tenframe/10-veld08.svg"],
        9: ["cards/tenframe/10-veld09.svg"],
        10: ["cards/tenframe/10-veld10.svg"]
      },
      dice: {
        1: ["cards/dice/dobbelsteen01a.svg"],
        2: ["cards/dice/dobbelsteen02a.svg", "cards/dice/dobbelsteen02b.svg"],
        3: ["cards/dice/dobbelsteen03a.svg", "cards/dice/dobbelsteen03b.svg", "cards/dice/dobbelsteen03c.svg"],
        4: ["cards/dice/dobbelsteen04a.svg", "cards/dice/dobbelsteen04b.svg", "cards/dice/dobbelsteen04c.svg", "cards/dice/dobbelsteen04d.svg"],
        5: ["cards/dice/dobbelsteen05a.svg", "cards/dice/dobbelsteen05b.svg", "cards/dice/dobbelsteen05c.svg", "cards/dice/dobbelsteen05d.svg", "cards/dice/dobbelsteen05e.svg"],
        6: ["cards/dice/dobbelsteen06a.svg", "cards/dice/dobbelsteen06b.svg", "cards/dice/dobbelsteen06c.svg", "cards/dice/dobbelsteen06d.svg", "cards/dice/dobbelsteen06e.svg", "cards/dice/dobbelsteen06f.svg"],
        7: ["cards/dice/dobbelsteen07a.svg", "cards/dice/dobbelsteen07b.svg", "cards/dice/dobbelsteen07c.svg", "cards/dice/dobbelsteen07d.svg"],
        8: ["cards/dice/dobbelsteen08a.svg", "cards/dice/dobbelsteen08b.svg", "cards/dice/dobbelsteen08c.svg"],
        9: ["cards/dice/dobbelsteen09a.svg", "cards/dice/dobbelsteen09b.svg"],
        10: ["cards/dice/dobbelsteen10a.svg"]
      }
    };

    function bindEvents() {
      els.minSlider.addEventListener("input", () => {
        const val = Number(els.minSlider.value);
        if (val > state.maxValue) {
          state.maxValue = val;
          els.maxSlider.value = String(val);
        }
        state.minValue = val;
        updateRangeUi();
      });

      els.maxSlider.addEventListener("input", () => {
        const val = Number(els.maxSlider.value);
        if (val < state.minValue) {
          state.minValue = val;
          els.minSlider.value = String(val);
        }
        state.maxValue = val;
        updateRangeUi();
      });

      document.querySelectorAll('#typeGroup input[type="checkbox"]').forEach(input => {
        input.addEventListener("change", () => {
          const selected = [...document.querySelectorAll('#typeGroup input:checked')].map(el => el.value);
          if (!selected.length) {
            input.checked = true;
            return;
          }
          state.types = new Set(selected);
          updateStatus();
        });
      });

      document.querySelectorAll('input[name="showTime"]').forEach(input => {
        input.addEventListener("change", () => {
          state.showTime = Number(input.value);
        });
      });

      els.showAgainBtn.addEventListener("click", handleToggleCard);
      els.newCardBtn.addEventListener("click", handleNewCard);
      els.showAnswerBtn.addEventListener("click", handleShowAnswer);
      els.nextStepBtn.addEventListener("click", handleNextStep);
      els.manualMoveBtn.addEventListener("click", handleManualMove);
      els.resetBtn.addEventListener("click", handleReset);

      els.rocketImg.onerror = () => {
        els.rocket.style.display = "none";
      };
    }

    function updateRangeUi() {
      els.minValue.textContent = String(state.minValue);
      els.maxValue.textContent = String(state.maxValue);
      updateStatus();
    }

    function updateStatus() {
      els.statusRange.textContent = `${state.minValue} t/m ${state.maxValue}`;
      const names = [...state.types].map(key => typeLabels[key]);
      els.statusTypes.textContent = names.length === 1 ? names[0] : `${names.length} soorten`;
    }

    function syncControls() {
      const hasCard = !!state.currentCard;
      const afterFlash = state.stage === "respond" || state.stage === "review" || state.stage === "answer";
      const missionDone = state.progress >= state.stepCount;

      els.showAgainBtn.disabled = !(hasCard && afterFlash);
      els.showAgainBtn.textContent = state.cardVisible ? "Verberg de kaart" : "Toon opnieuw";

      els.showAnswerBtn.disabled = !(hasCard && afterFlash);
      els.nextStepBtn.disabled = !(hasCard && afterFlash);
      els.newCardBtn.disabled = state.lock || !state.assetsReady;
      els.manualMoveBtn.disabled = state.lock || missionDone;
    }

    function announce(text) {
      els.liveRegion.textContent = text;
    }

    function setPrompt(icon) {
      els.promptIcon.textContent = icon;
      els.promptIcon.classList.remove("hidden");
      els.cardWrap.classList.add("hidden");
      els.answerBadge.classList.add("hidden");
      state.cardVisible = false;
      syncControls();
    }

    function showCard(card, showAnswer = false) {
      els.cardSurface.innerHTML = "";

      const img = document.createElement("img");
      img.src = card.src;
      img.alt = `${typeLabels[card.type]} ${card.value}`;
      img.onerror = () => {
        els.cardSurface.innerHTML = `<div style="font-size:1.25rem;color:#7a2632;text-align:center;font-weight:700;line-height:1.4;">kaart niet gevonden<br>${card.src}</div>`;
      };

      els.cardSurface.appendChild(img);
      els.cardWrap.classList.remove("hidden");
      els.promptIcon.classList.add("hidden");
      state.cardVisible = true;

      if (showAnswer) {
        els.answerBadge.textContent = card.value;
        els.answerBadge.classList.remove("hidden");
      } else {
        els.answerBadge.classList.add("hidden");
      }

      syncControls();
    }

    function handleToggleCard() {
      if (!state.currentCard || state.lock) return;

      if (state.cardVisible) {
        setPrompt("✋");
        if (state.stage === "review") {
          state.stage = "respond";
        }
        announce("Kaart verborgen.");
      } else {
        showCard(state.currentCard, state.stage === "answer");
        state.stage = state.stage === "answer" ? "answer" : "review";
        announce("Kaart opnieuw getoond.");
      }
    }

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function buildDeck() {
      const deck = [];
      for (const type of state.types) {
        const entries = state.cardManifest[type] || {};
        Object.entries(entries).forEach(([value, files]) => {
          const numericValue = Number(value);
          if (numericValue >= state.minValue && numericValue <= state.maxValue) {
            files.forEach(src => deck.push({ type, value: numericValue, src }));
          }
        });
      }
      return deck;
    }

    function generateCard() {
      const deck = buildDeck();
      if (!deck.length) return null;

      const distinctValues = [...new Set(deck.map(card => card.value))];

      let candidates = deck;

      if (
        state.previousAnswerValue !== null &&
        distinctValues.length >= 3
      ) {
        const filteredByValue = deck.filter(card => card.value !== state.previousAnswerValue);
        if (filteredByValue.length) {
          candidates = filteredByValue;
        }
      } else if (state.currentCard && deck.length > 1) {
        const filteredByCard = deck.filter(card => card.src !== state.currentCard.src);
        if (filteredByCard.length) {
          candidates = filteredByCard;
        }
      }

      return randomItem(candidates);
    }

    async function handleNewCard() {
      if (state.lock || !state.assetsReady) return;

      const card = generateCard();
      if (!card) {
        announce("Geen kaarten gevonden binnen dit bereik.");
        return;
      }

      state.currentCard = card;
      state.stage = "flash";
      state.lock = true;
      syncControls();

      showCard(card, false);
      announce("Nieuwe kaart getoond.");

      await sleep(state.showTime);

      setPrompt("✋");
      state.stage = "respond";
      state.lock = false;
      syncControls();
    }

    function handleShowAnswer() {
      if (!state.currentCard || state.lock) return;
      showCard(state.currentCard, true);
      state.stage = "answer";
      syncControls();
      announce(`Antwoord ${state.currentCard.value} getoond.`);
      celebrateSmall();
    }

    async function finishMissionSequence() {
      setPrompt("🎉");
      celebrateBig();
      prepareRocket();
      await sleep(220);
      await launchRocket();
      announce("Missie klaar. De raket stijgt op.");
    }

    async function advanceAstronautStep() {
      if (state.lock || state.progress >= state.stepCount) return false;

      state.lock = true;
      syncControls();

      state.progress = Math.min(state.progress + 1, state.stepCount);
      updateTrack();
      await animateAstronaut();

      if (state.progress >= state.stepCount) {
        await finishMissionSequence();
      } else {
        setPrompt("👀");
        announce("Astronaut is een stap verder.");
      }

      state.lock = false;
      syncControls();
      startIdleSprite();
      return true;
    }

    async function handleNextStep() {
      if (state.lock) return;
      const allowedStages = ["respond", "review", "answer"];
      if (!allowedStages.includes(state.stage)) return;

      const moved = await advanceAstronautStep();
      if (!moved) return;

      state.previousAnswerValue = state.currentCard ? state.currentCard.value : state.previousAnswerValue;
      state.currentCard = null;
      state.stage = "idle";
    }

    async function handleManualMove() {
      if (state.lock || state.progress >= state.stepCount) return;

      state.currentCard = null;
      state.stage = "idle";
      setPrompt("👀");
      await advanceAstronautStep();
    }

    function handleReset() {
  state.currentCard = null;
  state.previousAnswerValue = null;
  state.progress = 0;
  state.stage = "idle";
  state.lock = false;
  state.rocketReady = false;
  state.cardVisible = false;

  els.astronaut.style.display = "block";
  showAstronaut();
  resetAstronautVisualState();
  resetRocket();
  setPrompt("👀");
  syncControls();
  updateTrack();
  updateAstronautPosition(true);
  stopSpriteAnimation();
  startIdleSprite();
  announce("Missie opnieuw gestart.");
}

    function buildTrack() {
      els.track.innerHTML = '<div class="track-line"></div>';
      for (let i = 0; i < state.stepCount; i++) {
        const node = document.createElement("div");
        node.className = "track-node";
        node.dataset.index = i + 1;
        els.track.appendChild(node);
      }
      updateTrack();
    }

    function updateTrack() {
      const nodes = els.track.querySelectorAll(".track-node");
      nodes.forEach((node, idx) => {
        node.classList.toggle("done", idx < state.progress);
      });
    }

    function astronautHalfWidth() {
      return (els.astronaut?.offsetWidth || 360) / 2;
    }

    function getNodePositions() {
      const nodes = [...els.track.querySelectorAll(".track-node")];
      return nodes.map(node => node.offsetLeft + node.offsetWidth / 2 + els.track.offsetLeft);
    }

    function getStartLeft(nodePositions) {
      const half = astronautHalfWidth();
      const defaultGap = 160;
      let gap = defaultGap;
      if (nodePositions.length > 1) {
        gap = nodePositions[1] - nodePositions[0];
      }
      return nodePositions[0] - half - gap;
    }

    function updateAstronautPosition(immediate = false) {
      const nodePositions = getNodePositions();
      if (!nodePositions.length) return;

      const half = astronautHalfWidth();
      let left;

      if (state.progress === 0) {
        left = getStartLeft(nodePositions);
      } else {
        left = nodePositions[state.progress - 1] - half;
      }

      if (immediate) els.astronaut.style.transition = "none";
      els.astronaut.style.left = `${left}px`;


      if (immediate) {
        requestAnimationFrame(() => {
          els.astronaut.style.transition = DEFAULT_ASTRONAUT_TRANSITION;
        });
      }
    }

    function stopSpriteAnimation() {
      if (state.spriteTimer) {
        clearTimeout(state.spriteTimer);
        state.spriteTimer = null;
      }
    }

    function showAstronautFallback() {
      if (state.astronautFallbackShown) return;
      state.astronautFallbackShown = true;
      els.astronautImg.style.display = "none";
      if (!els.astronaut.querySelector(".astronaut-inner")) {
        const fallback = document.createElement("div");
        fallback.className = "astronaut-inner";
        fallback.style.fontSize = "5rem";
        fallback.textContent = "👨‍🚀";
        els.astronaut.appendChild(fallback);
      }
    }

    function clearAstronautFallback() {
      const fallback = els.astronaut.querySelector(".astronaut-inner");
      if (fallback) fallback.remove();
      state.astronautFallbackShown = false;
      els.astronautImg.style.display = "block";
    }

    function setAstronautSprite(src) {
      clearAstronautFallback();
      els.astronautImg.onerror = () => showAstronautFallback();
      els.astronautImg.src = src;
    }

    function preloadFrames(frames) {
      frames.forEach(src => {
        const img = new Image();
        img.src = src;
      });
    }

    function playFrameSequence(frames, fps = 16, loop = false) {
      stopSpriteAnimation();
      if (!frames.length) {
        showAstronautFallback();
        return;
      }

      let index = 0;
      const frameDuration = 1000 / fps;

      function next() {
        setAstronautSprite(frames[index]);
        index += 1;
        if (index >= frames.length) {
          if (loop) index = 0;
          else return;
        }
        state.spriteTimer = setTimeout(next, frameDuration);
      }

      next();
    }

    function startIdleSprite() {
      playFrameSequence(state.idleFrames, 1, true);
    }

    function resetAstronautVisualState() {
  els.astronaut.style.transform = "scale(1)";
  els.astronaut.style.opacity = "1";
  els.astronaut.style.transition = DEFAULT_ASTRONAUT_TRANSITION;
}

function showAstronaut() {
  els.astronaut.classList.remove("hidden-flight");
  els.astronaut.style.display = "block";
  els.astronaut.style.opacity = "1";
  els.astronaut.style.transform = "scale(1)";
}

function hideAstronaut() {
  els.astronaut.classList.add("hidden-flight");
  els.astronaut.style.opacity = "0";
}

  async function animateAstronaut() {
  const nodePositions = getNodePositions();
  if (!nodePositions.length) return;

  const half = astronautHalfWidth();
  const targetLeft = nodePositions[Math.max(0, state.progress - 1)] - half;

  const jumpSteps = [1, 3, 6];
  const isJumpStep = jumpSteps.includes(state.progress);
  const isFinalJump = state.progress === state.stepCount;

  showAstronaut();
  resetAstronautVisualState();

  if (isJumpStep) {
    const JUMP_START_FRAME = 90;
    const JUMP_MOVE_START_FRAME = 98;
    const JUMP_LAND_FRAME = 117;
    const JUMP_FPS = 18;

    playFrameSequence(state.jumpFrames, JUMP_FPS, false);

    const frameDuration = 1000 / JUMP_FPS;
    const anticipationFrames = JUMP_MOVE_START_FRAME - JUMP_START_FRAME; // 8
    const movingFrames = JUMP_LAND_FRAME - JUMP_MOVE_START_FRAME;        // 19

    const anticipationDelay = anticipationFrames * frameDuration;
    const moveDuration = movingFrames * frameDuration;

    els.astronaut.style.transition = "none";

    await sleep(anticipationDelay);

    els.astronaut.style.transition = `left ${Math.round(moveDuration)}ms linear`;
    els.astronaut.style.left = `${targetLeft}px`;

    await sleep(moveDuration);

    els.astronaut.style.transition = "none";
    createDust(targetLeft + half, 76);

    if (isFinalJump) {
      stopSpriteAnimation();
      hideAstronaut();
      await sleep(120);
    } else {
      const remainingFrames = state.jumpFrames.length - (JUMP_LAND_FRAME - JUMP_START_FRAME);
      const remainingDuration = remainingFrames * frameDuration;
      await sleep(remainingDuration);
      stopSpriteAnimation();
    }

    els.astronaut.style.transition = DEFAULT_ASTRONAUT_TRANSITION;
  } else {
    playFrameSequence(state.walkFrames, 18, true);
    els.astronaut.style.transition = "left 800ms linear";
    els.astronaut.style.left = `${targetLeft}px`;
    await sleep(820);
    stopSpriteAnimation();
    els.astronaut.style.transition = DEFAULT_ASTRONAUT_TRANSITION;
  }
}

    function createDust(x, y) {
      for (let i = 0; i < 7; i++) {
        const puff = document.createElement("div");
        puff.className = "dust";
        puff.style.left = `${x - 10 + Math.random() * 30}px`;
        puff.style.bottom = `${y - 8 + Math.random() * 14}px`;
        puff.style.setProperty("--dx", `${(Math.random() - 0.5) * 80}px`);
        puff.style.setProperty("--dy", `${-14 - Math.random() * 36}px`);
        puff.style.animationDelay = `${Math.random() * 90}ms`;
        els.dustLayer.appendChild(puff);
        puff.addEventListener("animationend", () => puff.remove());
      }
    }

    function celebrateSmall() {
      createSparks(8, 42, 58);
    }

    function celebrateBig() {
      createSparks(20, 48, 54);
    }

    function createSparks(count, minLeft, spread) {
      for (let i = 0; i < count; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";
        spark.textContent = i % 2 === 0 ? "⭐" : "✨";
        spark.style.left = `${minLeft + Math.random() * spread}%`;
        spark.style.top = `${18 + Math.random() * 46}%`;
        spark.style.setProperty("--dx", `${(Math.random() - 0.5) * 260}px`);
        spark.style.setProperty("--dy", `${(Math.random() - 0.5) * 220}px`);
        spark.style.animationDelay = `${Math.random() * 140}ms`;
        els.burst.appendChild(spark);
        spark.addEventListener("animationend", () => spark.remove());
      }
    }

    function prepareRocket() {
      state.rocketReady = true;
      els.rocket.classList.add("launch-ready");
    }

    function resetRocket() {
      els.rocket.classList.remove("launch-ready", "launching");
      els.rocket.style.animation = "none";
      els.rocket.style.opacity = "1";
      els.rocket.style.transform = "translateY(0) scale(1)";
      void els.rocket.offsetWidth;
      els.rocket.style.animation = "";
    }

    async function launchRocket() {
      resetRocket();
      els.rocket.classList.add("launch-ready");
      await sleep(80);

      void els.rocket.offsetWidth;
      els.rocket.classList.remove("launch-ready");
      els.rocket.classList.add("launching");

      createSparks(14, 72, 12);

      for (let i = 0; i < 7; i++) {
        createDust(els.rocket.offsetLeft + els.rocket.offsetWidth / 2 - 10, 70);
        await sleep(120);
      }

      await new Promise(resolve => {
        const done = () => {
          els.rocket.removeEventListener("animationend", done);
          resolve();
        };
        els.rocket.addEventListener("animationend", done, { once: true });
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function hasAnyCards() {
      return Object.values(state.cardManifest).some(group => Object.keys(group).length > 0);
    }

    function init() {
      bindEvents();
      buildTrack();
      updateRangeUi();
      state.assetsReady = hasAnyCards();
      syncControls();
      updateAstronautPosition(true);
      preloadFrames(state.idleFrames);
      preloadFrames(state.walkFrames);
      preloadFrames(state.jumpFrames);
      showAstronaut();
      resetAstronautVisualState();
      startIdleSprite();
      resetRocket();
      setPrompt("👀");
      announce("Spel geladen.");
    }

    init();
  </script>
</body>
</html>
